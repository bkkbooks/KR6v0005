body:
  text: 馬鳴菩薩造最上尊師於花足以真實心而頂禮諸本續中所宣説粗重犯墮略演説且最上尊師者是聖天菩薩所禮住能禮人馬鳴初欲禮足功驗因禮聖天之足有多應驗聖天之威德後馬鳴啓最上志誠三業虔恭頂禮聖天之花足也聖天問禮者禮住云何禮禮因禮緣故馬鳴造十四根八粗重依禪定本續中略開演觸犯儀軌第一頌云持密禪定母強為自受用此中有二種初是新授戒母二已授戒母無有人見禪定母勇猛等要受用作無二加行故不依法作強受用者犯粗重罪西天有一在於竭怛山初受大乘戒人見持禪定母要行淫染令誑受用禪定母實不解無二加行於禪定母處起淫染心故馬鳴菩薩造第一粗重罪此是説初受戒人犯罪二已受戒人犯罪者勇猛等先來受戒解無二加行女人創初發心受戒勇猛等不依法作犯第一重罪西天競伽河側有一持禪定人名折沒怛自七歲來時受大乘祕密戒因有一女人河邊過來見自女人顏貌端嚴此法師心中起淫染心言你受大乘祕密戒速疾成佛因自行遂淫欲故馬鳴造第一重罪第二頌云棄捨自禪定於聚輪中諍初受戒人不了聚輪義中諍話犯罪西天有一人實持禪定人八月十五日於尸堂林中持禪定或至一更來有多勇猛作集輪時於時此人問師因緣法滅後再在不作師當時生瞋默然不答勇猛等驚疑依此馬鳴造第二重罪第三頌云非器有情處説祕密法者此中有二種一初未受戒人處説此法者或見本尊等像或見祕密禪觀文字犯罪二後持禪定者先受大乘戒已不作禪定不念真言不放施食等經一年不依法修習者此人處以不説祕密法若説時犯粗重罪若再受戒時許説法不犯罪第四頌云具信心有情所説顛倒法此中有二種一無説句師不解祕密法第二習故所説顛倒法西天有一法師名山及多羅先受小乘別解脫戒能講三乘五性一切法門見此一人法師説有多人受戒卻將顯教法充作祕密而説實不解祕密就利養故所説顛倒法因此馬鳴造第四粗重第五頌云我慢聲聞者共宮在七夜持祕密禪定人與小乘聲聞等不得同房在七夜犯粗重罪西天有一法師常持小乘戒或於一日逢著一個持禪定人同房共住七夜持禪定人依法修作法師心生譭謗馬鳴因此造第五粗重第六頌云若不作法事密者自受用持禪定者受大乘祕密戒已不作禪定不念真言不放施食等係破戒再不受戒但名持禪定人者犯重罪西天有一般彌怛法師常與人受密戒有一人受了密戒已經一年於上師處並不學此法戒相此人不肯懺悔死入地獄因此馬鳴造第六粗重第七頌云不解禪定智密者起我慢持禪定者不解此教法義強言我能解祕密法誑初受戒人實不解妄生解犯粗重罪西天有一法師實不解祕密法或與多人説法有一僧到説法處法師你説法有其差別此法師生瞋犯粗重罪第八頌云無記句明母倚託故受用持禪定者要行加行倚託祕密法於無記句母住作加行犯粗重罪若或此故觸犯者依此建立於壇場隨依聚輪所作法以實思慮皆懺悔若有人犯此粗重須是集輪中作懺悔對本尊面前名白懺悔方可滅罪了畢録文完
