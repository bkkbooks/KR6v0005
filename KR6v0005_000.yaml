front:
  text: 八種粗重犯墮整理者方廣錩題解八種粗重犯墮印度佛教密教典籍作者不詳託名為馬鳴菩薩造譯者不詳一卷本典籍所述為密教戒律共計八條故名本典籍未為我國歷代經録所著録亦不為歷代大藏經所收現藏於俄羅斯科學院東方研究所聖彼得堡分所編號為被視為敦煌遺書但從種種迹象分析該典籍並非敦煌遺書應為在西夏故地黑城出土的西夏文獻本文獻對研究西夏佛教具有相當的參考價值整理者年在聖彼得堡考察時曾據原卷録文整理本據上述録文及上海古籍出版社俄藏敦煌文獻第四冊發表的照片録文無校本録文
